[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Belt-and-braces — the serve function already sets these headers,
# but this catches any edge cases in local dev.
[[headers]]
  for = "/f/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cross-Origin-Resource-Policy = "cross-origin"
